<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap&subset=cyrillic,cyrillic-ext,latin" rel="stylesheet">
  <style>
    @media (max-width:760px){
      .an-desk-nav{ display:none !important; }
      .an-bal-text{ display:none !important; }
      .an-tabbar{ display:flex !important; }
      .an-topbar{ padding:0 16px !important; gap:12px !important; }
      body{ padding-bottom:64px !important; }
    }
  </style>
</helmet>

<div style="position:sticky; top:0; z-index:40; background:#FFFFFF; border-bottom:1px solid #E6E1D6; font-family:'IBM Plex Sans',system-ui,sans-serif;">
  <div class="an-topbar" style="max-width:1280px; margin:0 auto; height:66px; padding:0 26px; display:flex; align-items:center; gap:28px;">

    <!-- logo lockup -->
    <a href="Catalog.dc.html" style="display:flex; align-items:center; text-decoration:none; flex:0 0 auto;">
      <img src="assets/logo.png" alt="АН агнуурийн үнийн санал дуудах систем" style="height:42px; width:auto; display:block;" />
    </a>

    <!-- nav links -->
    <nav class="an-desk-nav" style="display:flex; align-items:center; gap:4px; flex:1;">
      <sc-for list="{{ items }}" as="it" hint-placeholder-count="5">
        <a href="{{ it.href }}" style="position:relative; display:flex; align-items:center; gap:7px; padding:9px 13px; border-radius:8px; text-decoration:none; font-size:14px; font-weight:{{ it.weight }}; color:{{ it.color }}; background:{{ it.bg }};" style-hover="background:#F3F0E9;">
          {{ it.label }}
          <sc-if value="{{ it.showCount }}" hint-placeholder-val="{{ false }}">
            <span style="background:#C8312C; color:#fff; font-size:10.5px; font-weight:700; min-width:17px; height:17px; padding:0 4px; border-radius:9px; display:inline-flex; align-items:center; justify-content:center; font-variant-numeric:tabular-nums;">{{ it.count }}</span>
          </sc-if>
        </a>
      </sc-for>
    </nav>

    <!-- right cluster -->
    <div style="display:flex; align-items:center; gap:14px; flex:0 0 auto;">
      <a href="Balance.dc.html" data-tour="balance" style="display:flex; align-items:center; gap:8px; padding:7px 13px; border-radius:9px; background:#F3F0E9; border:1px solid #E6E1D6; text-decoration:none;" style-hover="border-color:#CDD4DE;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1F8A5B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="13" rx="2.5"/><path d="M16 12h2"/><path d="M2 10h20"/></svg>
        <span class="an-bal-text" style="line-height:1;">
          <span style="display:block; font-size:9.5px; color:#8A93A3; font-weight:500;">Боломжит үлдэгдэл</span>
          <span style="display:block; font-size:13px; font-weight:700; color:#14294A; font-variant-numeric:tabular-nums; margin-top:1px;">{{ balanceText }}</span>
        </span>
      </a>

      <a href="Notifications.dc.html" data-tour="notifications" title="Мэдэгдэл" style="position:relative; width:40px; height:40px; border-radius:9px; border:1px solid #E6E1D6; background:#fff; display:flex; align-items:center; justify-content:center; text-decoration:none;" style-hover="border-color:#CDD4DE;">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#5B6677" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
        <sc-if value="{{ hasNotif }}" hint-placeholder-val="{{ true }}">
          <span style="position:absolute; top:-5px; right:-5px; background:#C8312C; color:#fff; font-size:10px; font-weight:700; min-width:18px; height:18px; padding:0 4px; border-radius:9px; border:2px solid #fff; display:inline-flex; align-items:center; justify-content:center; font-variant-numeric:tabular-nums;">{{ notif }}</span>
        </sc-if>
      </a>

      <div title="{{ user }}" style="display:flex; align-items:center; gap:9px;">
        <span style="width:38px; height:38px; border-radius:50%; background:#14294A; color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600;">{{ initials }}</span>
      </div>
    </div>
  </div>
</div>

<!-- mobile bottom tab bar -->
<nav class="an-tabbar" style="display:none; position:fixed; left:0; right:0; bottom:0; z-index:50; background:#FFFFFF; border-top:1px solid #E6E1D6; height:62px; padding:0 4px; box-shadow:0 -2px 12px rgba(20,41,74,.06); font-family:'IBM Plex Sans',system-ui,sans-serif;">
  <sc-for list="{{ items }}" as="it" hint-placeholder-count="5">
    <a href="{{ it.href }}" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; text-decoration:none; color:{{ it.tabColor }};">
      <span style="position:relative; display:flex; align-items:center; justify-content:center;">
        {{ it.icon }}
        <sc-if value="{{ it.showCount }}" hint-placeholder-val="{{ false }}">
          <span style="position:absolute; top:-6px; right:-9px; background:#C8312C; color:#fff; font-size:9px; font-weight:700; min-width:15px; height:15px; padding:0 3px; border-radius:8px; border:1.5px solid #fff; display:inline-flex; align-items:center; justify-content:center; font-variant-numeric:tabular-nums;">{{ it.count }}</span>
        </sc-if>
      </span>
      <span style="font-size:10px; font-weight:{{ it.weight }}; letter-spacing:-.01em;">{{ it.tab }}</span>
    </a>
  </sc-for>
</nav>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:66},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;catalog&quot;,&quot;options&quot;:[&quot;catalog&quot;,&quot;bids&quot;,&quot;balance&quot;,&quot;notifications&quot;,&quot;help&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;balance&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:9000000,&quot;tsType&quot;:&quot;number&quot;},&quot;notif&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:3,&quot;tsType&quot;:&quot;number&quot;},&quot;user&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Б. Энхбаяр&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const active = this.props.active || 'catalog';
    const tic = (d) => React.createElement('svg', { width:21, height:21, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:1.8, strokeLinecap:'round', strokeLinejoin:'round' }, d.map((x,i)=>React.createElement('path',{key:i,d:x})));
    const icons = {
      catalog: ['M3 7l9-4 9 4-9 4-9-4z','M3 12l9 4 9-4','M3 17l9 4 9-4'],
      bids: ['M9 11l3 3 8-8','M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11'],
      balance: ['M2 6h20v13H2z','M2 10h20','M16 15h2'],
      notifications: ['M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9','M13.7 21a2 2 0 0 1-3.4 0'],
      help: ['M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z','M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3','M12 17h.01'],
    };
    const defs = [
      { key:'catalog', label:'Каталог', tab:'Каталог', href:'Catalog.dc.html' },
      { key:'bids', label:'Миний санал', tab:'Санал', href:'MyBids.dc.html' },
      { key:'balance', label:'Үлдэгдэл', tab:'Үлдэгдэл', href:'Balance.dc.html' },
      { key:'notifications', label:'Мэдэгдэл', tab:'Мэдэгдэл', href:'Notifications.dc.html' },
      { key:'help', label:'Тусламж', tab:'Тусламж', href:'Help.dc.html' },
    ];
    const notif = this.props.notif ?? 3;
    const items = defs.map(d => {
      const on = d.key === active;
      return {
        label: d.label, tab: d.tab, href: d.href, icon: tic(icons[d.key]),
        color: on ? '#C8312C' : '#3A4658',
        tabColor: on ? '#C8312C' : '#8A93A3',
        bg: on ? '#FBEFEE' : 'transparent',
        weight: on ? 700 : 500,
        showCount: d.key === 'notifications' && notif > 0,
        count: notif,
      };
    });
    const user = this.props.user || 'Б. Энхбаяр';
    const initials = user.split(/\s+/).map(p => p.replace('.', '')[0] || '').join('').slice(0,2).toUpperCase();
    const bal = this.props.balance ?? 9000000;
    return {
      items, notif, hasNotif: notif > 0,
      user, initials,
      balanceText: Math.round(bal).toLocaleString('en-US') + '₮',
    };
  }
}
</script>
</body>
</html>
