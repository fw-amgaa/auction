<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap&subset=cyrillic,cyrillic-ext,latin" rel="stylesheet">
  <style>
    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; background:#F5F2EC; }
    @keyframes livedot{ 0%{ opacity:1; transform:scale(1);} 50%{ opacity:.35; transform:scale(.7);} 100%{ opacity:1; transform:scale(1);} }
    @media (prefers-reduced-motion: reduce){ *{ animation-duration:.001ms !important; } }
  </style>
</helmet>

<div style="min-height:100vh; background:#F5F2EC; font-family:'IBM Plex Sans',system-ui,sans-serif; color:#1A2436;">

  <dc-import name="AppNav" active="bids" balance="6230000" notif="3" hint-size="100%,66px"></dc-import>

  <div style="max-width:1080px; margin:0 auto; padding:30px 26px 60px;">
    <h1 style="margin:0; font-size:28px; font-weight:700; color:#14294A;">Миний санал</h1>
    <p style="margin:6px 0 0; font-size:14px; color:#5B6677;">Таны оролцож буй болон дууссан дуудлага худалдаанууд.</p>

    <!-- tabs -->
    <div style="margin-top:22px; display:flex; gap:5px; background:#EFEBE1; border:1px solid #E6E1D6; border-radius:11px; padding:5px; width:fit-content; max-width:100%; overflow-x:auto;">
      <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="4">
        <button onClick="{{ t.onClick }}" style="display:flex; align-items:center; gap:8px; padding:9px 16px; border-radius:8px; border:none; background:{{ t.bg }}; color:{{ t.fg }}; font-size:13.5px; font-weight:{{ t.weight }}; cursor:pointer; white-space:nowrap;">
          {{ t.label }}
          <span style="background:{{ t.countBg }}; color:{{ t.countFg }}; font-size:11px; font-weight:700; min-width:19px; height:19px; padding:0 5px; border-radius:10px; display:inline-flex; align-items:center; justify-content:center; font-variant-numeric:tabular-nums;">{{ t.count }}</span>
        </button>
      </sc-for>
    </div>

    <!-- rows -->
    <div style="margin-top:20px; background:#FFF; border:1px solid #E6E1D6; border-radius:16px; overflow:hidden;">
      <sc-for list="{{ rows }}" as="r" hint-placeholder-count="4">
        <a href="{{ r.href }}" style="display:flex; align-items:center; gap:16px; padding:16px 20px; border-bottom:1px solid #F3EFE5; text-decoration:none;" style-hover="background:#FAF8F3;">
          <div style="width:62px; height:62px; border-radius:11px; flex:0 0 auto; background-image:repeating-linear-gradient(135deg,{{ r.stripeA }} 0 9px,{{ r.stripeB }} 9px 18px); display:flex; align-items:flex-end; justify-content:center; overflow:hidden;">
            <span style="font-size:9px; color:rgba(255,255,255,.85); padding-bottom:4px; font-weight:600;">{{ r.species }}</span>
          </div>
          <div style="flex:1; min-width:0;">
            <div style="display:flex; align-items:center; gap:9px;">
              <span style="font-family:'IBM Plex Mono',monospace; font-size:14px; font-weight:600; color:#14294A;">{{ r.code }}</span>
              <span style="display:flex; align-items:center; gap:5px; font-size:11px; font-weight:700; letter-spacing:.03em; padding:3px 9px; border-radius:7px; background:{{ r.badgeBg }}; color:{{ r.badgeFg }};">
                <sc-if value="{{ r.live }}" hint-placeholder-val="{{ false }}"><span style="width:6px; height:6px; border-radius:50%; background:{{ r.badgeFg }}; animation:livedot 1.4s infinite;"></span></sc-if>
                {{ r.badge }}
              </span>
            </div>
            <div style="font-size:12.5px; color:#8A93A3; margin-top:4px;">{{ r.sub }}</div>
          </div>
          <div style="text-align:right; flex:0 0 auto;">
            <div style="font-size:11px; color:#8A93A3;">{{ r.metricLabel }}</div>
            <div style="font-size:16px; font-weight:700; color:{{ r.metricColor }}; font-variant-numeric:tabular-nums; margin-top:1px;">{{ r.metric }}</div>
            <div style="font-size:11.5px; color:#A2AAB6; margin-top:2px; font-variant-numeric:tabular-nums;">{{ r.time }}</div>
          </div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C7CFD9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto;"><path d="m9 18 6-6-6-6"/></svg>
        </a>
      </sc-for>
      <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ false }}">
        <div style="padding:54px 20px; text-align:center;">
          <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#C7BFAE" stroke-width="1.5" style="margin:0 auto;"><path d="m12 3 2.6 5.8 6.4.6-4.8 4.3 1.4 6.3L12 17l-5.6 3.3 1.4-6.3L3 9.4l6.4-.6z"/></svg>
          <div style="font-size:16px; font-weight:600; color:#3A4658; margin-top:14px;">{{ emptyTitle }}</div>
          <div style="font-size:13.5px; color:#8A93A3; margin-top:5px;">{{ emptyBody }}</div>
          <a href="Catalog.dc.html" style="display:inline-block; margin-top:16px; background:#C8312C; color:#fff; text-decoration:none; border-radius:9px; padding:11px 20px; font-size:13.5px; font-weight:600;">Каталог үзэх</a>
        </div>
      </sc-if>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1080,&quot;height&quot;:620}}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    this.state = {
      tab: 'active',
      data: {
        active: [
          { code:'Угалз:U9', species:'Угалз', sp:['#2C4A6B','#26405F'], live:true, status:'leading', sub:'Та тэргүүлж байна · 7 оролцогч', myBid:5830000, cur:5830000, time:'03:25 үлдсэн' },
          { code:'Тэх:I4', species:'Тэх', sp:['#274463','#1F3A56'], live:true, status:'outbid', sub:'Таны саналыг давсан · 4 оролцогч', myBid:4120000, cur:4380000, time:'12:18 үлдсэн' },
        ],
        won: [
          { code:'Гахай:B5', species:'Гахай', sp:['#4A3A33','#3E302A'], status:'won', sub:'Та хожсон · төлбөр хийгдсэн', myBid:1120000, time:'IX/14' },
        ],
        lost: [
          { code:'Булга:Sa1', species:'Булга', sp:['#4A3E2E','#3E3326'], status:'lost', sub:'Өөр оролцогч хожсон · барьцаа буцаагдсан', myBid:480000, final:520000, time:'IX/13' },
        ],
        watching: [
          { code:'Угалз:U12', species:'Угалз', sp:['#2C4A6B','#26405F'], status:'watch', sub:'Удахгүй эхэлнэ · 45 минутын дараа', reserve:5800000, time:'эхлэхэд' },
          { code:'Янгир:Y2', species:'Янгир', sp:['#2B4A52','#23404A'], status:'watch', sub:'Удахгүй эхэлнэ · 2 цагийн дараа', reserve:2400000, time:'эхлэхэд' },
        ],
      },
    };
  }
  fmt(n){ return Math.round(n).toLocaleString('en-US') + '₮'; }
  renderVals(){
    const s = this.state;
    const d = s.data;
    const tabDefs = [
      { key:'active', label:'Идэвхтэй', count:d.active.length },
      { key:'won', label:'Хожсон', count:d.won.length },
      { key:'lost', label:'Хожигдсон', count:d.lost.length },
      { key:'watching', label:'Ажиглаж буй', count:d.watching.length },
    ];
    const tabs = tabDefs.map(t => {
      const on = t.key===s.tab;
      return { label:t.label, count:t.count,
        bg: on ? '#FFF':'transparent', fg: on ? '#14294A':'#5B6677', weight: on?700:500,
        countBg: on ? '#14294A':'#E0DACD', countFg: on ? '#FFF':'#5B6677',
        onClick:()=>this.setState({tab:t.key}) };
    });

    const badgeMap = {
      leading: { badge:'ТЭРГҮҮЛЖ БАЙНА', bg:'#E5F4EC', fg:'#1F8A5B' },
      outbid:  { badge:'ДАВУУЛСАН', bg:'#FBEAE9', fg:'#C8312C' },
      won:     { badge:'ХОЖСОН', bg:'#E5F4EC', fg:'#1F8A5B' },
      lost:    { badge:'ХОЖИГДСОН', bg:'#EEF1F5', fg:'#5B6677' },
      watch:   { badge:'УДАХГҮЙ', bg:'#FBF1DF', fg:'#C77A0A' },
    };

    const rows = (d[s.tab]||[]).map(r => {
      const b = badgeMap[r.status];
      let metricLabel, metric, metricColor, href='Lot%20Detail.dc.html';
      if (r.status==='leading'){ metricLabel='Миний санал'; metric=this.fmt(r.myBid); metricColor='#1F8A5B'; href='Live%20Bidding%20Room.dc.html'; }
      else if (r.status==='outbid'){ metricLabel='Одоогийн үнэ'; metric=this.fmt(r.cur); metricColor='#C8312C'; href='Live%20Bidding%20Room.dc.html'; }
      else if (r.status==='won'){ metricLabel='Хожсон үнэ'; metric=this.fmt(r.myBid); metricColor='#14294A'; }
      else if (r.status==='lost'){ metricLabel='Эцсийн үнэ'; metric=this.fmt(r.final); metricColor='#5B6677'; }
      else { metricLabel='Босго үнэ'; metric=this.fmt(r.reserve); metricColor='#14294A'; }
      return {
        code:r.code, species:r.species, sub:r.sub, time:r.time, href,
        stripeA:r.sp[0], stripeB:r.sp[1], live:!!r.live,
        badge:b.badge, badgeBg:b.bg, badgeFg:b.fg,
        metricLabel, metric, metricColor,
      };
    });

    const emptyMap = {
      active: { t:'Идэвхтэй санал алга', b:'Каталогоос лот сонгож оролцоно уу.' },
      won: { t:'Хожсон лот алга', b:'Дуудлага худалдаанд оролцож эхлээрэй.' },
      lost: { t:'Хожигдсон лот алга', b:'' },
      watching: { t:'Ажиглаж буй лот алга', b:'Сонирхсон лотоо одоор тэмдэглэ.' },
    };

    return {
      tabs, rows, isEmpty: rows.length===0,
      emptyTitle: emptyMap[s.tab].t, emptyBody: emptyMap[s.tab].b,
    };
  }
}
</script>
</body>
</html>
