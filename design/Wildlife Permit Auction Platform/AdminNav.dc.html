<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap&subset=cyrillic,cyrillic-ext,latin" rel="stylesheet">
</helmet>

<div style="width:228px; min-height:100vh; background:#0E1E38; color:#C7D4E6; font-family:'IBM Plex Sans',system-ui,sans-serif; display:flex; flex-direction:column; flex:0 0 228px;">
  <div style="padding:18px 16px 16px; border-bottom:1px solid rgba(255,255,255,.08);">
    <div style="background:#fff; border-radius:10px; padding:8px 10px;">
      <img src="assets/logo.png" alt="АН агнуурийн үнийн санал дуудах систем" style="width:100%; height:auto; display:block;" />
    </div>
    <div style="font-size:10px; color:#7E92B2; letter-spacing:.1em; margin-top:9px; text-align:center; font-weight:600;">АДМИН ПАНЕЛ</div>
  </div>

  <nav style="padding:14px 12px; display:flex; flex-direction:column; gap:3px; flex:1;">
    <sc-for list="{{ items }}" as="it" hint-placeholder-count="6">
      <a href="{{ it.href }}" style="display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:9px; text-decoration:none; font-size:13.5px; font-weight:{{ it.weight }}; color:{{ it.color }}; background:{{ it.bg }}; position:relative;" style-hover="background:rgba(255,255,255,.05);">
        <span style="width:20px; display:flex; align-items:center; justify-content:center; flex:0 0 auto;">{{ it.icon }}</span>
        <span style="flex:1;">{{ it.label }}</span>
        <sc-if value="{{ it.hasBadge }}" hint-placeholder-val="{{ false }}">
          <span style="background:#C8312C; color:#fff; font-size:10.5px; font-weight:700; min-width:18px; height:18px; padding:0 5px; border-radius:9px; display:inline-flex; align-items:center; justify-content:center; font-variant-numeric:tabular-nums;">{{ it.badge }}</span>
        </sc-if>
      </a>
    </sc-for>
  </nav>

  <div style="padding:14px 12px; border-top:1px solid rgba(255,255,255,.08);">
    <div style="display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:9px; background:rgba(255,255,255,.04);">
      <span style="width:32px; height:32px; border-radius:50%; background:#1F8A5B; color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex:0 0 auto;">{{ initials }}</span>
      <div style="line-height:1.2; min-width:0;">
        <div style="font-size:12.5px; font-weight:600; color:#fff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">{{ admin }}</div>
        <div style="font-size:10.5px; color:#7E92B2;">Зохион байгуулагч</div>
      </div>
    </div>
    <a href="Login.dc.html" style="display:flex; align-items:center; gap:9px; padding:9px 10px; margin-top:5px; border-radius:8px; text-decoration:none; font-size:12.5px; color:#7E92B2;" style-hover="color:#fff;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg>
      Гарах
    </a>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:228,&quot;height&quot;:640},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;monitor&quot;,&quot;options&quot;:[&quot;monitor&quot;,&quot;kyc&quot;,&quot;users&quot;,&quot;limits&quot;,&quot;lots&quot;,&quot;results&quot;,&quot;audit&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;admin&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Г. Болормаа&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  icon(name){
    const p = { fill:'none', stroke:'currentColor', strokeWidth:1.8, strokeLinecap:'round', strokeLinejoin:'round', width:18, height:18, viewBox:'0 0 24 24' };
    const paths = {
      monitor: ['M3 3v18h18','m7 14 3-4 3 3 4-6'],
      kyc: ['M16 11a4 4 0 1 0-8 0','M4 21a8 8 0 0 1 16 0','m17 8 1.5 1.5L21 6'],
      users: ['M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2','M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z','M22 21v-2a4 4 0 0 0-3-3.87','M16 3.13a4 4 0 0 1 0 7.75'],
      limit: ['M12 2v20','M5 7h14','M5 12h14','M5 17h14'],
      lots: ['M3 7l9-4 9 4-9 4-9-4z','M3 12l9 4 9-4','M3 17l9 4 9-4'],
      results: ['M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z','M14 2v6h6','M9 13l2 2 4-4'],
      audit: ['M12 8v4l3 2','M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z'],
    };
    const d = paths[name] || paths.monitor;
    return React.createElement('svg', p, d.map((dd,i)=>React.createElement('path',{key:i,d:dd})));
  }
  renderVals(){
    const active = this.props.active || 'monitor';
    const defs = [
      { key:'monitor', label:'Шууд хяналт', href:'Admin%20Live%20Monitor.dc.html', icon:'monitor' },
      { key:'kyc', label:'KYC хүсэлт', href:'Admin%20KYC.dc.html', icon:'kyc', badge:5 },
      { key:'users', label:'Хэрэглэгчид', href:'Admin%20Users.dc.html', icon:'users' },
      { key:'limits', label:'Лимит удирдлага', href:'Admin%20Limits.dc.html', icon:'limit' },
      { key:'lots', label:'Лот удирдлага', href:'Admin%20Lots.dc.html', icon:'lots' },
      { key:'results', label:'Үр дүн / экспорт', href:'Admin%20Results.dc.html', icon:'results' },
      { key:'audit', label:'Аудит лог', href:'Admin%20Audit.dc.html', icon:'audit' },
    ];
    const items = defs.map(d => {
      const on = d.key === active;
      return {
        label:d.label, href:d.href, icon:this.icon(d.icon),
        color: on ? '#fff' : '#A9BAD4',
        bg: on ? '#C8312C' : 'transparent',
        weight: on ? 700 : 500,
        hasBadge: !!d.badge, badge: d.badge,
      };
    });
    const admin = this.props.admin || 'Г. Болормаа';
    const initials = admin.split(/\s+/).map(p=>p.replace('.','')[0]||'').join('').slice(0,2).toUpperCase();
    return { items, admin, initials };
  }
}
</script>
</body>
</html>
