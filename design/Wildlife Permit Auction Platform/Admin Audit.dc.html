<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap&subset=cyrillic,cyrillic-ext,latin" rel="stylesheet">
  <style>
    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; background:#EEF1F5; }
    input,select{ font-family:inherit; }
  </style>
</helmet>

<div style="min-height:100vh; display:flex; font-family:'IBM Plex Sans',system-ui,sans-serif; color:#1A2436; background:#EEF1F5;">

  <dc-import name="AdminNav" active="audit" hint-size="228px,100vh"></dc-import>

  <div style="flex:1; min-width:0; display:flex; flex-direction:column;">
    <div style="height:60px; background:#FFF; border-bottom:1px solid #E1E5EC; display:flex; align-items:center; justify-content:space-between; padding:0 24px;">
      <h1 style="margin:0; font-size:18px; font-weight:700; color:#14294A;">Аудит лог</h1>
      <button onClick="{{ exportLog }}" style="display:flex; align-items:center; gap:7px; background:#FFF; border:1px solid #CDD4DE; color:#14294A; border-radius:9px; padding:9px 14px; font-size:13px; font-weight:600; cursor:pointer;" style-hover="border-color:#14294A;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
        Лог татах
      </button>
    </div>

    <div style="flex:1; overflow-y:auto; padding:20px 24px 32px;">
      <!-- filter -->
      <div style="background:#FFF; border:1px solid #E1E5EC; border-radius:12px; padding:12px 14px; display:flex; align-items:center; gap:11px; flex-wrap:wrap; margin-bottom:16px;">
        <div style="position:relative; flex:1 1 240px; min-width:200px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8A93A3" stroke-width="1.9" stroke-linecap="round" style="position:absolute; left:12px; top:50%; transform:translateY(-50%);"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input value="{{ q }}" onInput="{{ onSearch }}" placeholder="Үйлдэл, админ, объектоор хайх" style="width:100%; height:40px; padding:0 12px 0 36px; border-radius:9px; border:1px solid #E1E5EC; background:#F7F8FA; font-size:13.5px; outline:none;" />
        </div>
        <div style="display:flex; gap:6px; flex-wrap:wrap;">
          <sc-for list="{{ filters }}" as="f" hint-placeholder-count="5">
            <button onClick="{{ f.onClick }}" style="padding:8px 13px; border-radius:8px; border:1px solid {{ f.border }}; background:{{ f.bg }}; color:{{ f.fg }}; font-size:12.5px; font-weight:{{ f.weight }}; cursor:pointer;">{{ f.label }}</button>
          </sc-for>
        </div>
      </div>

      <div style="background:#FFF; border:1px solid #E1E5EC; border-radius:14px; overflow:hidden;">
        <div style="display:grid; grid-template-columns:150px 1fr 1.4fr 150px; gap:14px; padding:11px 18px; background:#F7F8FA; border-bottom:1px solid #EBEEF3; font-size:11px; font-weight:700; color:#8A93A3; text-transform:uppercase; letter-spacing:.03em;">
          <span>Цаг</span><span>Админ</span><span>Үйлдэл</span><span style="text-align:right;">Төрөл</span>
        </div>
        <sc-for list="{{ rows }}" as="r" hint-placeholder-count="8">
          <div style="display:grid; grid-template-columns:150px 1fr 1.4fr 150px; gap:14px; padding:13px 18px; border-bottom:1px solid #F1F3F6; align-items:center;">
            <span style="font-family:'IBM Plex Mono',monospace; font-size:12px; color:#5B6677; font-variant-numeric:tabular-nums;">{{ r.time }}</span>
            <div style="display:flex; align-items:center; gap:9px; min-width:0;">
              <span style="width:26px; height:26px; border-radius:50%; flex:0 0 auto; background:#EEF1F5; color:#14294A; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700;">{{ r.adminInit }}</span>
              <span style="font-size:12.5px; color:#3A4658; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">{{ r.admin }}</span>
            </div>
            <div style="min-width:0;">
              <span style="font-size:13px; color:#14294A;">{{ r.action }}</span>
              <span style="font-size:12px; color:#8A93A3;"> · {{ r.target }}</span>
            </div>
            <span style="display:flex; justify-content:flex-end;"><span style="display:flex; align-items:center; gap:5px; font-size:11px; font-weight:700; padding:3px 9px; border-radius:6px; background:{{ r.tagBg }}; color:{{ r.tagFg }};">{{ r.tagIcon }} {{ r.tagLabel }}</span></span>
          </div>
        </sc-for>
        <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ false }}">
          <div style="padding:44px; text-align:center; font-size:13.5px; color:#8A93A3;">Тохирох бичлэг алга.</div>
        </sc-if>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:760}}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    this.state = {
      q:'', cat:'all',
      logs:[
        { time:'09:51:42', admin:'Г. Болормаа', action:'KYC баталгаажуулсан', target:'Доржийн Батбаяр', cat:'kyc' },
        { time:'09:44:10', admin:'Г. Болормаа', action:'Хэрэглэгч үүсгэсэн', target:'Хангайн Зэрлэг ХХК', cat:'user' },
        { time:'09:30:05', admin:'Б. Энхтөр', action:'Лимит нэмсэн (+4,000,000₮)', target:'Доржийн Батбаяр', cat:'limit' },
        { time:'09:12:38', admin:'Г. Болормаа', action:'Лот үүсгэсэн', target:'Угалз:U13', cat:'lot' },
        { time:'08:58:21', admin:'Б. Энхтөр', action:'KYC татгалзсан', target:'Гомбын Алтанцэцэг', cat:'kyc' },
        { time:'08:40:00', admin:'Систем', action:'Дуудлага автоматаар эхэлсэн', target:'Угалз:U9', cat:'auction' },
        { time:'08:22:14', admin:'Г. Болормаа', action:'Агнуурын эрх олгосон', target:'Гахай:B5 · Оролцогч #4', cat:'lot' },
        { time:'08:05:47', admin:'Б. Энхтөр', action:'Офлайн буцаалт бүртгэсэн (−1,000,000₮)', target:'Лхагвын Сүхбат', cat:'limit' },
        { time:'07:50:30', admin:'Г. Болормаа', action:'Лот цуцалсан', target:'Шувуу:S3', cat:'lot' },
        { time:'07:33:12', admin:'Систем', action:'Хугацаа сунгасан (анти-снайп)', target:'Тэх:I4', cat:'auction' },
      ],
    };
  }
  renderVals(){
    const s = this.state;
    const catMeta = { kyc:['◉','KYC','#E5F4EC','#197a50'], user:['◉','Хэрэглэгч','#E5F0FB','#1B5FA8'], limit:['◉','Лимит','#FBF1DF','#C77A0A'], lot:['◉','Лот','#F3EEFB','#7A4FC0'], auction:['◉','Дуудлага','#FBEAE9','#C8312C'] };
    const filterDefs = [['all','Бүгд'],['kyc','KYC'],['user','Хэрэглэгч'],['limit','Лимит'],['lot','Лот'],['auction','Дуудлага']];
    const filters = filterDefs.map(([k,label])=>{ const on=k===s.cat; return { label, bg:on?'#14294A':'#FFF', fg:on?'#FFF':'#5B6677', border:on?'#14294A':'#E1E5EC', weight:on?700:500, onClick:()=>this.setState({cat:k}) }; });
    const q = s.q.trim().toLowerCase();
    const rows = s.logs.filter(l=>(s.cat==='all'||l.cat===s.cat) && (!q||l.action.toLowerCase().includes(q)||l.admin.toLowerCase().includes(q)||l.target.toLowerCase().includes(q))).map(l=>{
      const c = catMeta[l.cat]||catMeta.user;
      return { time:l.time, admin:l.admin, adminInit: l.admin==='Систем'?'СИ':l.admin.split(/\s+/).map(p=>p.replace('.','')[0]||'').join('').slice(0,2).toUpperCase(),
        action:l.action, target:l.target, tagIcon:c[0], tagLabel:c[1], tagBg:c[2], tagFg:c[3] };
    });
    return { q:s.q, onSearch:(e)=>this.setState({q:e.target.value}), filters, rows, isEmpty:rows.length===0, exportLog:()=>{} };
  }
}
</script>
</body>
</html>
